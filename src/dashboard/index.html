<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Following Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      background-color: #0a0a0f;
      color: #00ffd5;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0, 255, 213, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(120, 0, 255, 0.04) 0%, transparent 50%),
        linear-gradient(180deg, #0a0a0f 0%, #0d0d1a 100%);
      background-attachment: fixed;
    }

    #app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      min-height: 100%;
      position: relative;
    }

    /* Scanline overlay effect */
    #app::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 213, 0.008) 2px,
        rgba(0, 255, 213, 0.008) 4px
      );
      z-index: 9999;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0f;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 255, 213, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 255, 213, 0.5);
    }

    ::selection {
      background: rgba(0, 255, 213, 0.2);
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="index.js"></script>
</body>
</html>
